<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contractors — 1-800Accountant Portal</title>
<link rel="icon" href=".claude/1-800Accountant Design System/assets/brand/favicon.ico">
<link rel="stylesheet" href=".claude/1-800Accountant Design System/ui_kits/portal/portal.css">
<style>
/* ── Nested nav (Payroll section) ─────────────────────────── */
.nav-section-parent {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  font-weight: 500; font-size: 14px;
  color: rgba(18,23,36,.65);
  cursor: default;
  border-left: 3px solid transparent;
  user-select: none;
}
.nav-child {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px 9px 40px;
  font-size: 13px; font-weight: 500;
  color: rgba(18,23,36,.6);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 150ms ease, color 150ms ease;
}
.nav-child:hover { background: rgba(0,0,0,.04); color: rgba(18,23,36,.9); }
.nav-child.active {
  background: #DBF6E7; color: #1F7262;
  border-left-color: #2DA38D;
}

/* ── Page chrome ──────────────────────────────────────────── */
.page-titlebar {
  padding: 20px 28px 16px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.page-titlebar h1 { margin: 0; font-size: 20px; font-weight: 600; }

/* ── Two-column split ─────────────────────────────────────── */
.split-layout {
  display: flex; flex: 1; overflow: hidden; min-height: 0;
}
.list-col {
  width: 380px; flex-shrink: 0;
  display: flex; flex-direction: column;
  padding: 20px 18px;
  gap: 12px;
  overflow-y: auto;
  border-right: 1px solid rgba(0,0,0,.08);
}
.detail-col {
  flex: 1; min-width: 0;
  overflow-y: auto;
  padding: 24px 28px;
}

/* ── Contractor list row ──────────────────────────────────── */
.c-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,.08);
  background: #fff;
  cursor: pointer;
  transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
}
.c-row:hover { border-color: rgba(45,163,141,.35); box-shadow: 0 2px 8px rgba(45,163,141,.1); }
.c-row.selected { border-color: #2DA38D; box-shadow: 0 0 0 2px rgba(45,163,141,.15); background: #fafffe; }
.c-row-info { flex: 1; min-width: 0; }
.c-name { font-size: 14px; font-weight: 600; color: #121724; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-meta { font-size: 12px; color: rgba(18,23,36,.5); margin-top: 2px; }

/* ── Empty state ──────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px;
  color: rgba(18,23,36,.4);
  text-align: center;
}
.empty-state p { margin: 0; font-size: 14px; }

/* ── Detail panel ─────────────────────────────────────────── */
.detail-header {
  display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px;
}
.detail-actions { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 0; margin-top: 12px; }
.info-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: rgba(18,23,36,.6); padding: 3px 0; }
.info-row strong { color: #121724; font-weight: 600; }

/* ── Progress bar ─────────────────────────────────────────── */
.prog-track { height: 6px; background: #eef0f5; border-radius: 999px; margin: 10px 0 16px; overflow: hidden; }
.prog-fill { height: 100%; background: #2DA38D; border-radius: 999px; transition: width 400ms ease; }

/* ── Checklist ────────────────────────────────────────────── */
.check-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.check-row:last-child { border-bottom: 0; }
.check-circle {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f1f3f8;
}
.check-circle.done { background: #DBF6E7; }
.check-label { flex: 1; font-size: 14px; font-weight: 500; color: #121724; }
.check-label.done { color: rgba(18,23,36,.45); text-decoration: line-through; text-decoration-color: rgba(18,23,36,.2); }

/* ── Modal ────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 50;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff; border-radius: 16px;
  width: 560px; max-width: calc(100vw - 32px); max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.22);
  display: flex; flex-direction: column;
}
.modal-top { padding: 24px 26px 0; flex-shrink: 0; }
.modal-body { padding: 18px 26px; flex: 1; }
.modal-foot {
  padding: 14px 26px 22px;
  border-top: 1px solid rgba(0,0,0,.08);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}

/* ── Step dots ────────────────────────────────────────────── */
.step-row { display: flex; gap: 5px; margin-bottom: 20px; }
.step-pip { height: 4px; border-radius: 999px; flex: 1; background: #e8eaf0; transition: background 200ms ease; }
.step-pip.active, .step-pip.past { background: #2DA38D; }

/* ── Type cards ───────────────────────────────────────────── */
.type-card {
  border: 2px solid rgba(0,0,0,.1); border-radius: 12px;
  padding: 16px; cursor: pointer;
  transition: border-color 150ms ease, background 150ms ease;
  display: flex; align-items: flex-start; gap: 14px;
}
.type-card:hover { border-color: rgba(45,163,141,.4); }
.type-card.sel { border-color: #2DA38D; background: rgba(45,163,141,.04); }
.type-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: #f2f4f8;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 150ms ease;
}
.type-card.sel .type-icon { background: #DBF6E7; }
.type-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.type-desc { font-size: 12px; color: rgba(18,23,36,.55); }

/* ── Radio option ─────────────────────────────────────────── */
.radio-card {
  border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  padding: 13px 15px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 150ms ease, background 150ms ease;
}
.radio-card:hover { border-color: rgba(45,163,141,.4); }
.radio-card.sel { border-color: #2DA38D; background: rgba(45,163,141,.03); }
.radio-dot {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(0,0,0,.2);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 150ms ease;
}
.radio-card.sel .radio-dot { border-color: #2DA38D; }

/* ── Form ─────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  color: rgba(18,23,36,.6); text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 6px;
}
.form-input {
  width: 100%; height: 40px; padding: 0 12px;
  border: 1px solid rgba(0,0,0,.16); border-radius: 6px;
  font-size: 14px; font-family: inherit; color: #121724;
  background: #fff; outline: none; box-sizing: border-box;
  transition: border-color 150ms ease, box-shadow 150ms ease;
}
.form-input:focus { border-color: #2DA38D; box-shadow: 0 0 0 3px rgba(45,163,141,.1); }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Wage / account type toggle ───────────────────────────── */
.wage-toggle { display: flex; border: 1px solid rgba(0,0,0,.14); border-radius: 6px; overflow: hidden; }
.wage-opt {
  flex: 1; padding: 10px; text-align: center;
  font-size: 14px; font-weight: 500; cursor: pointer;
  background: #fff; color: rgba(18,23,36,.6);
  transition: background 150ms ease, color 150ms ease;
}
.wage-opt.sel { background: #2DA38D; color: #fff; }

/* ── Review rows ──────────────────────────────────────────── */
.rev-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,.06); font-size: 14px;
}
.rev-row:last-child { border-bottom: 0; }
.rev-key { color: rgba(18,23,36,.5); font-weight: 500; }
.rev-val { font-weight: 600; color: #121724; text-align: right; }

/* ── Notice banners ───────────────────────────────────────── */
.notice {
  border-radius: 10px; padding: 12px 15px; font-size: 13px; line-height: 1.5;
  background: #EBF8FF; border: 1px solid rgba(45,130,180,.2); color: #1a5c80;
}
.notice strong { color: #0f4060; }
.notice-neutral {
  border-radius: 10px; padding: 12px 15px; font-size: 13px; line-height: 1.5;
  background: #f5f6fa; border: 1px solid rgba(0,0,0,.1); color: rgba(18,23,36,.7);
}
.notice-neutral strong { color: #121724; }

/* ── Utils ────────────────────────────────────────────────── */
.dollar-wrap { position: relative; }
.dollar-wrap .dollar-sign { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(18,23,36,.4); font-weight: 600; pointer-events: none; }
.dollar-wrap .form-input { padding-left: 22px; }
.hint { font-size: 12px; color: rgba(18,23,36,.45); margin-top: 5px; }
.checkbox-row { display: flex; align-items: center; gap: 9px; font-size: 14px; cursor: pointer; user-select: none; }
.checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #2DA38D; cursor: pointer; }

/* ── Danger btn ───────────────────────────────────────────── */
.btn-danger {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 32px; padding: 0 13px; border-radius: 4px; border: 1px solid rgba(199,29,29,.25);
  background: transparent; color: #C71D1D; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background 150ms ease, border-color 150ms ease;
}
.btn-danger:hover { background: rgba(199,29,29,.06); border-color: rgba(199,29,29,.5); }
</style>
</head>

// ────────────────────────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────────────────────────

function displayName(c) {
  return c.type === 'Business' ? c.business_name : `${c.first_name} ${c.last_name}`;
}

function initials(c) {
  if (c.type === 'Business') return c.business_name.slice(0, 2).toUpperCase();
  return `${c.first_name[0]}${c.last_name[0]}`.toUpperCase();
}

function statusPill(s) {
  return {
    onboarding_completed:    { label: 'Onboarded',   cls: 'pill-success' },
    self_onboarding_started: { label: 'Invite Sent', cls: 'pill-info'    },
    onboarding_pending:      { label: 'Incomplete',  cls: 'pill-warn'    },
    new:                     { label: 'New',         cls: 'pill-muted'   },
  }[s] || { label: s, cls: 'pill-muted' };
}

function pct(steps) {
  return Math.round((steps.filter(s => s.done).length / steps.length) * 100);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return new Date(y, m - 1, day).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

// Convert a contractor object back into form fields for the edit modal
function contractorToForm(c) {
  return {
    type: c.type || 'Individual',
    method: c.onboarding_status === 'self_onboarding_started' ? 'self' : 'employer',
    firstName: c.first_name || '',
    lastName:  c.last_name  || '',
    businessName: c.business_name || '',
    email: c.email || '',
    startDate: c.start_date || '',
    workState: c.work_state || '',
    fileNewHire: !!(c.steps?.find(s => s.title === 'File new hire report')?.done),
    wageType: c.wage_type || 'Hourly',
    rate: c.rate || '',
    street1:   c.address?.street1 || '',
    street2:   c.address?.street2 || '',
    city:      c.address?.city    || '',
    addrState: c.address?.state   || '',
    zip:       c.address?.zip     || '',
    // Routing + account number are never pre-filled (security). Nickname and type are safe.
    bankName:      c.bank_account?.name         || '',
    routingNumber: '',
    accountNumber: '',
    accountType:   c.bank_account?.account_type || 'Checking',
  };
}

function ContractorDetail({ c, idx, onEdit }) {
  const { label, cls } = statusPill(c.onboarding_status);
  const p = pct(c.steps);
  const doneRequired = c.steps.filter(s => s.required && s.done).length;
  const totalRequired = c.steps.filter(s => s.required).length;

  return (
    <div style={{ maxWidth: 580 }}>
      {/* Header card */}
      <div className="card-s" style={{ marginBottom: 16 }}>
        <div className="detail-header">
          <div className="av lg" style={{ background: AVATAR_COLORS[idx % AVATAR_COLORS.length] }}>
            {initials(c)}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 8, marginBottom: 5 }}>
              <h2 style={{ margin: 0, fontSize: 19, fontWeight: 600 }}>{displayName(c)}</h2>
              <span className={`pill ${cls}`}>{label}</span>
            </div>
            <span className="pill pill-muted" style={{ fontSize: 12 }}>{c.type}</span>
          </div>
          <div className="detail-actions">
            <button className="btn btn-secondary btn-sm" onClick={onEdit} style={{ cursor: 'pointer' }}>Edit</button>
            <button className="btn-danger">Dismiss</button>
          </div>
        </div>

        <div className="divider" style={{ margin: '14px 0 10px' }} />

        <div className="info-grid">
          <div className="info-row">{I.email}&nbsp;<span>Email&emsp;</span><strong>{c.email}</strong></div>
          <div className="info-row">{I.calendar}&nbsp;<span>Started&emsp;</span><strong>{fmtDate(c.start_date)}</strong></div>
          <div className="info-row">{I.location}&nbsp;<span>Work state&emsp;</span><strong>{c.work_state}</strong></div>
          <div className="info-row">{I.dollar}&nbsp;<strong>
            {c.wage_type === 'Hourly' ? `$${c.rate}/hr` : `$${Number(c.rate).toLocaleString()} fixed`}
          </strong></div>
          {c.address && c.address.street1 && (
            <div className="info-row" style={{ gridColumn: '1 / -1', marginTop: 2 }}>
              {I.location}&nbsp;<span>Address&emsp;</span>
              <strong>{c.address.street1}{c.address.street2 ? `, ${c.address.street2}` : ''}, {c.address.city}, {c.address.state} {c.address.zip}</strong>
            </div>
          )}
          <div className="info-row" style={{ gridColumn: '1 / -1', marginTop: 2 }}>
            {I.bank}&nbsp;<span>Payment&emsp;</span>
            {c.bank_account ? (
              <strong>Direct Deposit · {c.bank_account.account_type} {c.bank_account.hidden_account_number}</strong>
            ) : (
              <strong style={{ color: 'rgba(18,23,36,.45)' }}>Check</strong>
            )}
          </div>
        </div>
      </div>

      {/* Checklist card */}
      <div className="card-s">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
          <h3 style={{ margin: 0, fontSize: 15, fontWeight: 600 }}>Onboarding Checklist</h3>
          <span className="muted" style={{ fontSize: 13 }}>
            {doneRequired}/{totalRequired} required steps
          </span>
        </div>

        <div className="prog-track" role="progressbar" aria-valuenow={p} aria-valuemin={0} aria-valuemax={100} aria-label={`${p}% complete`}>
          <div className="prog-fill" style={{ width: `${p}%` }} />
        </div>

        {c.steps.map((step) => (
          <div key={step.title} className="check-row">
            <div className={`check-circle${step.done ? ' done' : ''}`}>
              {I.check(step.done)}
            </div>
            <span className={`check-label${step.done ? ' done' : ''}`}>{step.title}</span>
            <span className={`pill ${step.required ? 'pill-muted' : 'pill-info'}`} style={{ fontSize: 11, flexShrink: 0 }}>
              {step.required ? 'Required' : 'Optional'}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// CONTRACTOR MODAL  (add + edit)
// ────────────────────────────────────────────────────────────────────────────

const TOTAL_STEPS = 6;
const STEP_LABELS  = ['', 'Contractor Type', 'Basic Details', 'Compensation', 'Address', 'Payment Info', 'Review'];

function ContractorModal({ onClose, onSave, contractor = null }) {
  const mode = contractor ? 'edit' : 'add';
  const [step, setStep] = React.useState(1);
  const [form, setForm] = React.useState(() =>
    contractor ? contractorToForm(contractor) : { ...DEFAULT_FORM }
  );

  const set    = (k) => (e) => setForm(f => ({ ...f, [k]: e.target ? e.target.value : e }));
  const toggle = (k) => ()  => setForm(f => ({ ...f, [k]: !f[k] }));

  // ── Validation per step ──────────────────────────────────────────────────
  const canNext = React.useMemo(() => {
    if (step === 2) {
      if (form.type === 'Business') return !!(form.businessName && form.email && form.workState);
      return !!(form.firstName && form.lastName && form.email && form.workState);
    }
    if (step === 3) return !!form.rate;
    if (step === 4) return !!(form.street1 && form.city && form.addrState && form.zip);
    if (step === 5) {
      const r = form.routingNumber.trim();
      const a = form.accountNumber.trim();
      if (!r && !a) return true;   // Both empty → skip / keep existing
      if (r && a)   return true;   // Both filled → valid
      return false;                // Partial → invalid
    }
    return true;
  }, [step, form]);

  // ── Save handler ─────────────────────────────────────────────────────────
  const handleSave = () => {
    const newBankInfo = !!(form.routingNumber.trim() && form.accountNumber.trim());
    const existingBank = contractor?.bank_account || null;
    const bankAccount  = newBankInfo
      ? {
          name:                 form.bankName || `${form.accountType} Account`,
          routing_number:       form.routingNumber.trim(),
          hidden_account_number:`XXXX${form.accountNumber.trim().slice(-4)}`,
          account_type:         form.accountType,
        }
      : (mode === 'edit' ? existingBank : null);

    const addressDone = !!(form.street1 && form.city && form.addrState && form.zip);

    const steps = [
      { title: 'Basic details',        required: true,  done: true         },
      { title: 'Compensation details', required: true,  done: true         },
      { title: 'Add an address',       required: true,  done: addressDone  },
      { title: 'Payment details',      required: true,  done: !!bankAccount},
      { title: 'Sign documents',       required: false, done: mode === 'edit'
          ? !!(contractor?.steps?.find(s => s.title === 'Sign documents')?.done)
          : false },
      { title: 'File new hire report', required: false, done: !!form.fileNewHire },
    ];

    const allRequiredDone = steps.filter(s => s.required).every(s => s.done);
    const onboarding_status = allRequiredDone
      ? 'onboarding_completed'
      : form.method === 'self' ? 'self_onboarding_started' : 'onboarding_pending';

    onSave({
      uuid:          contractor?.uuid || String(Date.now()),
      type:          form.type,
      first_name:    form.firstName    || null,
      last_name:     form.lastName     || null,
      business_name: form.businessName || null,
      email:         form.email,
      start_date:    form.startDate || new Date().toISOString().slice(0, 10),
      work_state:    form.workState,
      wage_type:     form.wageType,
      rate:          form.rate,
      address:       { street1: form.street1, street2: form.street2, city: form.city, state: form.addrState, zip: form.zip },
      bank_account:  bankAccount,
      onboarding_status,
      steps,
    });
  };

  // Close on Escape
  React.useEffect(() => {
    const fn = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, []);

  const partialBank = !!(form.routingNumber.trim()) !== !!(form.accountNumber.trim());

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()} role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div className="modal">

        {/* ── Header ───────────────────────────────────────── */}
        <div className="modal-top">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <h2 id="modal-title" style={{ margin: 0, fontSize: 18, fontWeight: 600 }}>
                {mode === 'edit' ? 'Edit Contractor' : 'Add Contractor'}
              </h2>
              <p className="muted" style={{ margin: '3px 0 0', fontSize: 13 }}>
                Step {step} of {TOTAL_STEPS} — {STEP_LABELS[step]}
              </p>
            </div>
            <button onClick={onClose} className="btn btn-sm" style={{ background: 'transparent', border: 0, padding: 4, cursor: 'pointer', color: 'rgba(18,23,36,.5)' }} aria-label="Close dialog">
              {I.close}
            </button>
          </div>
        </div>

        <div className="modal-body">
          {/* Step dots */}
          <div className="step-row" aria-hidden="true">
            {Array.from({ length: TOTAL_STEPS }, (_, i) => i + 1).map(n => (
              <div key={n} className={`step-pip${n < step ? ' past' : n === step ? ' active' : ''}`} />
            ))}
          </div>

          {/* ── Step 1: Contractor Type ───────────────────── */}
          {step === 1 && (
            <div>
              <p style={{ fontWeight: 600, marginBottom: 10, marginTop: 0 }}>What type of contractor?</p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                {[
                  { v: 'Individual', icon: I.person,   title: 'Individual', desc: 'Freelancer, consultant, or sole proprietor' },
                  { v: 'Business',   icon: I.business, title: 'Business',   desc: 'LLC, Corp, or other business entity' },
                ].map(({ v, icon, title, desc }) => (
                  <div key={v}
                    className={`type-card${form.type === v ? ' sel' : ''}`}
                    onClick={() => setForm(f => ({ ...f, type: v }))}
                    role="radio" aria-checked={form.type === v} tabIndex={0}
                    onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && setForm(f => ({ ...f, type: v }))}
                  >
                    <div className="type-icon">{icon}</div>
                    <div>
                      <div className="type-title">{title}</div>
                      <div className="type-desc">{desc}</div>
                    </div>
                  </div>
                ))}
              </div>

              <p style={{ fontWeight: 600, marginBottom: 10, marginTop: 0 }}>How will they onboard?</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
                {[
                  { v: 'employer', title: "I'll enter their info",          desc: 'Enter all details on their behalf' },
                  { v: 'self',     title: 'Send a self-onboarding invite',  desc: 'Contractor completes their own details via email link' },
                ].map(({ v, title, desc }) => (
                  <div key={v}
                    className={`radio-card${form.method === v ? ' sel' : ''}`}
                    onClick={() => setForm(f => ({ ...f, method: v }))}
                    role="radio" aria-checked={form.method === v} tabIndex={0}
                    onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && setForm(f => ({ ...f, method: v }))}
                  >
                    <div className="radio-dot">
                      {form.method === v && <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#2DA38D' }} />}
                    </div>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{title}</div>
                      <div style={{ fontSize: 12, color: 'rgba(18,23,36,.55)' }}>{desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Step 2: Basic Details ─────────────────────── */}
          {step === 2 && (
            <div>
              {form.type === 'Business' ? (
                <div className="form-group">
                  <label className="form-label" htmlFor="biz-name">Business Name</label>
                  <input id="biz-name" className="form-input" value={form.businessName} onChange={set('businessName')} placeholder="Acme Corp LLC" autoFocus />
                </div>
              ) : (
                <div className="form-group form-row-2">
                  <div>
                    <label className="form-label" htmlFor="first-name">First Name</label>
                    <input id="first-name" className="form-input" value={form.firstName} onChange={set('firstName')} placeholder="Jane" autoFocus />
                  </div>
                  <div>
                    <label className="form-label" htmlFor="last-name">Last Name</label>
                    <input id="last-name" className="form-input" value={form.lastName} onChange={set('lastName')} placeholder="Smith" />
                  </div>
                </div>
              )}
              <div className="form-group">
                <label className="form-label" htmlFor="email">Email Address</label>
                <input id="email" className="form-input" type="email" value={form.email} onChange={set('email')} placeholder="contractor@email.com" />
              </div>
              <div className="form-row-2 form-group">
                <div>
                  <label className="form-label" htmlFor="start-date">Start Date</label>
                  <input id="start-date" className="form-input" type="date" value={form.startDate} onChange={set('startDate')} />
                </div>
                <div>
                  <label className="form-label" htmlFor="work-state">Work State</label>
                  <select id="work-state" className="form-input" value={form.workState} onChange={set('workState')}>
                    <option value="">Select state…</option>
                    {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <label className="checkbox-row" htmlFor="new-hire">
                <input id="new-hire" type="checkbox" checked={form.fileNewHire} onChange={toggle('fileNewHire')} />
                File new hire report
              </label>
            </div>
          )}

          {/* ── Step 3: Compensation ──────────────────────── */}
          {step === 3 && (
            <div>
              <div className="form-group">
                <label className="form-label">Wage Type</label>
                <div className="wage-toggle" role="radiogroup" aria-label="Wage type">
                  {['Hourly', 'Fixed'].map(wt => (
                    <div key={wt} className={`wage-opt${form.wageType === wt ? ' sel' : ''}`} onClick={() => setForm(f => ({ ...f, wageType: wt }))} role="radio" aria-checked={form.wageType === wt} tabIndex={0}>{wt}</div>
                  ))}
                </div>
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="rate">Rate</label>
                <div className="dollar-wrap">
                  <span className="dollar-sign">$</span>
                  <input id="rate" className="form-input" type="number" min="0" step="0.01" value={form.rate} onChange={set('rate')} placeholder="0.00" autoFocus />
                </div>
                <p className="hint">{form.wageType === 'Hourly' ? 'Per hour worked' : 'Per payment or project'}</p>
              </div>
            </div>
          )}

          {/* ── Step 4: Address ───────────────────────────── */}
          {step === 4 && (
            <div>
              <div className="form-group">
                <label className="form-label" htmlFor="street1">Street Address</label>
                <input id="street1" className="form-input" value={form.street1} onChange={set('street1')} placeholder="123 Main St" autoFocus />
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="street2">
                  Apt, Suite, Unit&nbsp;<span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(optional)</span>
                </label>
                <input id="street2" className="form-input" value={form.street2} onChange={set('street2')} placeholder="Apt 4B" />
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="city">City</label>
                <input id="city" className="form-input" value={form.city} onChange={set('city')} placeholder="San Francisco" />
              </div>
              <div className="form-row-2 form-group">
                <div>
                  <label className="form-label" htmlFor="addr-state">State</label>
                  <select id="addr-state" className="form-input" value={form.addrState} onChange={set('addrState')}>
                    <option value="">Select state…</option>
                    {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label className="form-label" htmlFor="zip">ZIP Code</label>
                  <input id="zip" className="form-input" value={form.zip} onChange={set('zip')} placeholder="94107" maxLength={10} />
                </div>
              </div>
            </div>
          )}

          {/* ── Step 5: Payment Info ──────────────────────── */}
          {step === 5 && (
            <div>
              {/* Context notice */}
              {contractor?.bank_account ? (
                <div className="notice-neutral" style={{ marginBottom: 18 }}>
                  <strong>Account on file:</strong> {contractor.bank_account.name} · {contractor.bank_account.account_type} {contractor.bank_account.hidden_account_number}
                  <span style={{ display: 'block', marginTop: 4, fontSize: 12, color: 'rgba(18,23,36,.5)' }}>
                    Leave routing and account number blank to keep the existing account unchanged.
                  </span>
                </div>
              ) : (
                <p style={{ margin: '0 0 18px', fontSize: 13, color: 'rgba(18,23,36,.6)', lineHeight: 1.55 }}>
                  Adding a bank account sets the payment method to&nbsp;
                  <strong style={{ color: '#121724' }}>Direct Deposit</strong>.
                  This step is optional — you can add it later.
                </p>
              )}

              <div className="form-group">
                <label className="form-label" htmlFor="bank-name">
                  Account Nickname&nbsp;<span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(optional)</span>
                </label>
                <input id="bank-name" className="form-input" value={form.bankName} onChange={set('bankName')} placeholder="e.g. Chase Checking" autoFocus />
              </div>

              <div className="form-row-2 form-group">
                <div>
                  <label className="form-label" htmlFor="routing">Routing Number</label>
                  <input id="routing" className="form-input" value={form.routingNumber} onChange={set('routingNumber')} placeholder="9 digits" maxLength={9} />
                </div>
                <div>
                  <label className="form-label" htmlFor="account-num">Account Number</label>
                  <input id="account-num" className="form-input" value={form.accountNumber} onChange={set('accountNumber')} placeholder="Account number" />
                </div>
              </div>

              <div className="form-group">
                <label className="form-label">Account Type</label>
                <div className="wage-toggle" role="radiogroup" aria-label="Account type">
                  {['Checking', 'Savings'].map(at => (
                    <div key={at} className={`wage-opt${form.accountType === at ? ' sel' : ''}`} onClick={() => setForm(f => ({ ...f, accountType: at }))} role="radio" aria-checked={form.accountType === at} tabIndex={0}>{at}</div>
                  ))}
                </div>
              </div>

              {partialBank && (
                <p style={{ fontSize: 12, color: '#C71D1D', margin: '0 0 4px' }}>
                  Both routing number and account number are required to enable Direct Deposit.
                </p>
              )}
            </div>
          )}

          {/* ── Step 6: Review ────────────────────────────── */}
          {step === 6 && (
            <div>
              <div className="card-s" style={{ marginBottom: 14, padding: '6px 16px' }}>
                <div className="rev-row"><span className="rev-key">Type</span><span className="rev-val">{form.type}</span></div>
                <div className="rev-row">
                  <span className="rev-key">Name</span>
                  <span className="rev-val">{form.type === 'Business' ? form.businessName : `${form.firstName} ${form.lastName}`}</span>
                </div>
                <div className="rev-row"><span className="rev-key">Email</span><span className="rev-val">{form.email}</span></div>
                <div className="rev-row"><span className="rev-key">Start Date</span><span className="rev-val">{fmtDate(form.startDate) || 'Today'}</span></div>
                <div className="rev-row"><span className="rev-key">Work State</span><span className="rev-val">{form.workState}</span></div>
                <div className="rev-row">
                  <span className="rev-key">Compensation</span>
                  <span className="rev-val">${form.rate} {form.wageType === 'Hourly' ? '/ hr' : 'fixed'}</span>
                </div>
                <div className="rev-row">
                  <span className="rev-key">Address</span>
                  <span className="rev-val" style={{ textAlign: 'right' }}>
                    {form.street1}{form.street2 ? `, ${form.street2}` : ''}<br/>
                    {form.city}, {form.addrState} {form.zip}
                  </span>
                </div>
                <div className="rev-row">
                  <span className="rev-key">Payment</span>
                  {(form.routingNumber.trim() && form.accountNumber.trim()) ? (
                    <span className="rev-val">Direct Deposit · {form.accountType} ····{form.accountNumber.trim().slice(-4)}</span>
                  ) : mode === 'edit' && contractor?.bank_account ? (
                    <span className="rev-val">{contractor.bank_account.account_type} {contractor.bank_account.hidden_account_number} (unchanged)</span>
                  ) : (
                    <span className="rev-val" style={{ color: 'rgba(18,23,36,.5)', fontWeight: 500 }}>Check (add bank account later)</span>
                  )}
                </div>
                <div className="rev-row"><span className="rev-key">Onboarding</span><span className="rev-val">{form.method === 'self' ? 'Self-onboarding invite' : 'Employer entry'}</span></div>
                <div className="rev-row" style={{ borderBottom: 0 }}>
                  <span className="rev-key">New hire report</span>
                  <span className="rev-val">{form.fileNewHire ? 'Yes' : 'No'}</span>
                </div>
              </div>
              {form.method === 'self' && mode !== 'edit' && (
                <div className="notice">
                  <strong>Note:</strong> Gusto does not send emails directly to contractors. You'll need to share the self-onboarding link with {form.type === 'Business' ? form.businessName : form.firstName} through your own communication channels.
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── Footer ───────────────────────────────────────── */}
        <div className="modal-foot">
          <button className="btn btn-secondary btn-sm" onClick={onClose} style={{ cursor: 'pointer' }}>Cancel</button>
          <div style={{ flex: 1 }} />
          {step > 1 && (
            <button className="btn btn-secondary btn-sm" onClick={() => setStep(s => s - 1)} style={{ cursor: 'pointer' }}>Back</button>
          )}
          {step < TOTAL_STEPS ? (
            <button
              className="btn btn-primary btn-sm"
              onClick={() => setStep(s => s + 1)}
              disabled={!canNext}
              style={{ cursor: canNext ? 'pointer' : 'not-allowed', opacity: canNext ? 1 : 0.45 }}
            >
              Continue
            </button>
          ) : (
            <button className="btn btn-primary btn-sm" onClick={handleSave} style={{ cursor: 'pointer' }}>
              {mode === 'edit' ? 'Save Changes' : 'Add Contractor'}
            </button>
          )}
        </div>

      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// CONTRACTORS PAGE
// ────────────────────────────────────────────────────────────────────────────

function ContractorsPage() {
  const [contractors, setContractors]   = React.useState(SAMPLE);
  const [selected, setSelected]         = React.useState(SAMPLE[0]);
  const [modalOpen, setModalOpen]       = React.useState(false);
  const [editContractor, setEditContractor] = React.useState(null); // null = add mode

  const openAdd = () => {
    setEditContractor(null);
    setModalOpen(true);
  };

  const openEdit = (c) => {
    setEditContractor(c);
    setModalOpen(true);
  };

  const handleClose = () => {
    setModalOpen(false);
    setEditContractor(null);
  };

  const handleSave = (data) => {
    if (editContractor) {
      // Edit: replace in list
      setContractors(prev => prev.map(c => c.uuid === data.uuid ? data : c));
      setSelected(data);
    } else {
      // Add: append to list
      setContractors(prev => [...prev, data]);
      setSelected(data);
    }
    handleClose();
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}>
      {/* Title bar */}
      <div className="page-titlebar">
        <div>
          <h1 style={{ margin: 0, fontSize: 20, fontWeight: 600 }}>Contractors</h1>
          <p style={{ margin: '2px 0 0', fontSize: 13, color: 'rgba(18,23,36,.5)' }}>
            {contractors.length} contractor{contractors.length !== 1 ? 's' : ''}
          </p>
        </div>
      </div>

      {/* Split layout */}
      <div className="split-layout">
        {/* Left: list */}
        <div className="list-col">
          <button className="btn btn-primary" onClick={openAdd} style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, alignSelf: 'flex-start' }}>
            {I.plus} Add Contractor
          </button>

          {contractors.length === 0 ? (
            <div className="empty-state" style={{ flex: 1 }}>
              {I.emptyContractors}
              <p>No contractors yet.<br/>Click "Add Contractor" to get started.</p>
            </div>
          ) : (
            contractors.map((c, i) => (
              <ContractorRow
                key={c.uuid}
                c={c} idx={i}
                selected={selected?.uuid === c.uuid}
                onSelect={() => setSelected(c)}
              />
            ))
          )}
        </div>

        {/* Divider */}
        <div style={{ width: 1, background: 'rgba(0,0,0,.08)', flexShrink: 0 }} />

        {/* Right: detail */}
        <div className="detail-col">
          {selected ? (
            <ContractorDetail
              c={selected}
              idx={contractors.findIndex(c => c.uuid === selected.uuid)}
              onEdit={() => openEdit(selected)}
            />
          ) : (
            <div className="empty-state" style={{ height: '100%' }}>
              {I.emptyContractors}
              <p>Select a contractor to see the details.</p>
            </div>
          )}
        </div>
      </div>

      {modalOpen && (
        <ContractorModal
          onClose={handleClose}
          onSave={handleSave}
          contractor={editContractor}
        />
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// APP
// ────────────────────────────────────────────────────────────────────────────

function App() {
  return (
    <div className="app">
      <Sidebar />
      <div className="main" style={{ overflow: 'hidden' }}>
        <Topbar />
        <ContractorsPage />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
