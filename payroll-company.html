<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Company Details — 1-800Accountant Portal</title>
<link rel="icon" href=".claude/1-800Accountant Design System/assets/brand/favicon.ico">
<link rel="stylesheet" href=".claude/1-800Accountant Design System/ui_kits/portal/portal.css">
<style>
/* ── Nested nav (Payroll section) ─────────────────────────── */
.nav-section-parent {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; font-weight: 500; font-size: 14px;
  color: rgba(18,23,36,.65); cursor: default;
  border-left: 3px solid transparent; user-select: none;
}
.nav-child {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px 9px 40px;
  font-size: 13px; font-weight: 500; color: rgba(18,23,36,.6);
  cursor: pointer; border-left: 3px solid transparent;
  transition: background 150ms ease, color 150ms ease;
}
.nav-child:hover { background: rgba(0,0,0,.04); color: rgba(18,23,36,.9); }
.nav-child.active { background: #DBF6E7; color: #1F7262; border-left-color: #2DA38D; }

/* ── Page chrome ──────────────────────────────────────────── */
.page-titlebar {
  padding: 20px 28px 16px; background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07);
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
}

/* ── Content area ─────────────────────────────────────────── */
.content-area { flex: 1; overflow-y: auto; padding: 24px 28px; }
.content-inner { max-width: 860px; margin: 0 auto; }

/* ── Company header ───────────────────────────────────────── */
.co-header { display: flex; align-items: flex-start; gap: 16px; }
.co-av {
  width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
  background: #2DA38D; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; letter-spacing: -.5px;
}
.co-meta { flex: 1; min-width: 0; }
.co-name { font-size: 20px; font-weight: 700; color: #121724; margin: 0 0 4px; }
.co-sub  { font-size: 13px; color: rgba(18,23,36,.55); display: flex; align-items: center; gap: 8px; }
.co-stats {
  display: flex; gap: 0;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid rgba(0,0,0,.06);
}
.co-stat {
  flex: 1; display: flex; flex-direction: column; gap: 3px;
  padding: 0 16px;
  border-right: 1px solid rgba(0,0,0,.06);
}
.co-stat:first-child { padding-left: 0; }
.co-stat:last-child  { border-right: 0; }
.co-stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: rgba(18,23,36,.45); }
.co-stat-val   { font-size: 14px; font-weight: 600; color: #121724; }

/* ── Setup checklist ──────────────────────────────────────── */
.phase-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: rgba(18,23,36,.4);
  padding: 10px 0 6px;
}
.setup-step {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 0; border-bottom: 1px solid rgba(0,0,0,.05);
}
.setup-step:last-child { border-bottom: 0; }
.step-badge {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.step-badge.completed { background: #DBF6E7; }
.step-badge.ready     { background: rgba(45,163,141,.12); }
.step-badge.awaiting  { background: rgba(241,95,34,.1); }
.step-badge.blocked   { background: #f1f3f8; }
.step-body { flex: 1; min-width: 0; }
.step-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.step-title { font-size: 14px; font-weight: 600; color: #121724; }
.step-desc  { font-size: 12px; color: rgba(18,23,36,.5); line-height: 1.45; }
.step-end   { display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-top: 2px; }
.simulate-link {
  font-size: 11px; color: rgba(18,23,36,.4); cursor: pointer;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid rgba(0,0,0,.1);
  background: transparent; font-family: inherit;
  transition: background 150ms ease, color 150ms ease;
}
.simulate-link:hover { background: rgba(0,0,0,.05); color: rgba(18,23,36,.7); }

/* ── Progress bar ─────────────────────────────────────────── */
.prog-track { height: 6px; background: #eef0f5; border-radius: 999px; margin: 10px 0 4px; overflow: hidden; }
.prog-fill  { height: 100%; background: #2DA38D; border-radius: 999px; transition: width 500ms ease; }

/* ── Detail grid ──────────────────────────────────────────── */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
.dc-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  color: rgba(18,23,36,.45); margin: 0 0 11px;
}
.dc-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,.05); font-size: 13px; gap: 8px;
}
.dc-row:last-child { border-bottom: 0; }
.dc-key { color: rgba(18,23,36,.55); font-weight: 500; flex-shrink: 0; }
.dc-val { color: #121724; font-weight: 600; text-align: right; }
.loc-item {
  padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.05);
  font-size: 13px;
}
.loc-item:last-child { border-bottom: 0; padding-bottom: 0; }
.loc-name { font-weight: 600; color: #121724; margin-bottom: 2px; }
.loc-addr { color: rgba(18,23,36,.55); font-size: 12px; }
.loc-tags { display: flex; gap: 5px; margin-top: 5px; }

/* ── Modal ────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 50;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff; border-radius: 16px;
  width: 560px; max-width: calc(100vw - 32px); max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.22);
  display: flex; flex-direction: column;
}
.modal-top  { padding: 24px 26px 0; flex-shrink: 0; }
.modal-body { padding: 18px 26px; flex: 1; }
.modal-foot {
  padding: 14px 26px 22px; border-top: 1px solid rgba(0,0,0,.08);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}

/* ── Modal tabs ───────────────────────────────────────────── */
.modal-tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,.1); margin-bottom: 18px; }
.modal-tab {
  padding: 8px 16px; font-size: 14px; font-weight: 500;
  color: rgba(18,23,36,.55); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 150ms ease, border-color 150ms ease;
}
.modal-tab.active { color: #2DA38D; border-bottom-color: #2DA38D; }
.modal-tab:hover:not(.active) { color: rgba(18,23,36,.8); }

/* ── Form ─────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  color: rgba(18,23,36,.6); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
}
.form-input {
  width: 100%; height: 40px; padding: 0 12px;
  border: 1px solid rgba(0,0,0,.16); border-radius: 6px;
  font-size: 14px; font-family: inherit; color: #121724;
  background: #fff; outline: none; box-sizing: border-box;
  transition: border-color 150ms ease, box-shadow 150ms ease;
}
.form-input:focus { border-color: #2DA38D; box-shadow: 0 0 0 3px rgba(45,163,141,.1); }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-select { appearance: none; cursor: pointer; }
.hint { font-size: 12px; color: rgba(18,23,36,.45); margin-top: 5px; }

/* ── Document rows ────────────────────────────────────────── */
.doc-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid rgba(0,0,0,.05);
}
.doc-row:last-child { border-bottom: 0; }
.doc-icon {
  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
  background: #f1f3f8; display: flex; align-items: center; justify-content: center;
}
.doc-icon.signed { background: #DBF6E7; }
.doc-body { flex: 1; min-width: 0; }
.doc-name { font-size: 14px; font-weight: 600; color: #121724; }
.doc-sub  { font-size: 12px; color: rgba(18,23,36,.5); margin-top: 1px; }

/* ── Signatory card ───────────────────────────────────────── */
.sig-card {
  border: 1px solid rgba(0,0,0,.1); border-radius: 10px; padding: 14px;
  margin-bottom: 18px;
}
.sig-header { font-size: 13px; font-weight: 600; color: rgba(18,23,36,.65); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; font-size: 11px; }

/* ── Notice banners ───────────────────────────────────────── */
.notice {
  border-radius: 10px; padding: 12px 15px; font-size: 13px; line-height: 1.5;
  background: #EBF8FF; border: 1px solid rgba(45,130,180,.2); color: #1a5c80;
  margin-bottom: 16px;
}
.notice strong { color: #0f4060; }
.notice-success {
  border-radius: 10px; padding: 12px 15px; font-size: 13px; line-height: 1.5;
  background: #DBF6E7; border: 1px solid rgba(31,114,98,.2); color: #1F7262;
  margin-bottom: 16px;
}
.notice-warn {
  border-radius: 10px; padding: 12px 15px; font-size: 13px; line-height: 1.5;
  background: #FFF7ED; border: 1px solid rgba(217,119,6,.2); color: #92400e;
  margin-bottom: 16px;
}

/* ── Amount inputs ────────────────────────────────────────── */
.amount-wrap { position: relative; }
.amount-wrap .dollar-sign {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: rgba(18,23,36,.4); font-weight: 600; pointer-events: none;
}
.amount-wrap .form-input { padding-left: 22px; }

/* ── Finish banner ────────────────────────────────────────── */
.finish-banner {
  border: 2px solid #2DA38D; border-radius: 12px; padding: 16px 20px;
  background: rgba(45,163,141,.04); margin-top: 4px;
  display: flex; align-items: center; gap: 16px;
}

/* ── Btn danger ───────────────────────────────────────────── */
.btn-danger {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 32px; padding: 0 13px; border-radius: 4px; border: 1px solid rgba(199,29,29,.25);
  background: transparent; color: #C71D1D; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background 150ms ease, border-color 150ms ease;
}
.btn-danger:hover { background: rgba(199,29,29,.06); border-color: rgba(199,29,34,.5); }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return new Date(y, m - 1, day).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

    completed: { pillCls: 'pill-success', pillLabel: 'Complete',          iconColor: '#1F7262', badgeCls: 'completed' },

function CompanyPage() {
  const [steps, setSteps] = React.useState(INITIAL_STEPS);
  const [activeModal, setActiveModal] = React.useState(null);
  const [onboardingFinished, setOnboardingFinished] = React.useState(false);

  const completedCount = steps.filter(s => s.status === 'completed').length;
  const totalCount     = steps.length;
  const pct            = Math.round((completedCount / totalCount) * 100);
  const allDone        = completedCount === totalCount;

  // Mark a step as completed and auto-unblock dependents
  const completeStep = (stepId, descriptionOverride) => {
    setSteps(prev => {
      const updated = prev.map(s =>
        s.id === stepId
          ? { ...s, status: 'completed', description: descriptionOverride || s.description }
          : s
      );
      // Unblock sign_all_forms when both state_setup and verify_bank_info are done
      const stateSetupDone  = updated.find(s => s.id === 'state_setup')?.status === 'completed';
      const bankVerified    = updated.find(s => s.id === 'verify_bank_info')?.status === 'completed';
      if (stateSetupDone && bankVerified) {
        return updated.map(s =>
          s.id === 'sign_all_forms'
            ? { ...s, status: 'ready', description: 'Add authorized signatory and sign required documents' }
            : s
        );
      }
      return updated;
    });
    setActiveModal(null);
  };

  // Simulate micro-deposit arrival (demo only)
  const simulateDeposits = () => {
    setSteps(prev => prev.map(s =>
      s.id === 'verify_bank_info'
        ? { ...s, status: 'ready', description: 'Deposits received — enter amounts to verify' }
        : s
    ));
  };

  // Group consecutive steps by phase for section headers
  const phases = steps.reduce((acc, step) => {
    const last = acc[acc.length - 1];
    if (last && last.phase === step.phase) {
      last.steps.push(step);
    } else {
      acc.push({ phase: step.phase, steps: [step] });
    }
    return acc;
  }, []);

  const stepIcon = (status) => ({
    completed: I.check('#1F7262'),
    ready:     I.circle,
    awaiting:  I.clock,
    blocked:   I.lock,
  }[status]);

  const overallStatus = onboardingFinished
    ? { label: 'Active',      cls: 'pill-success' }
    : allDone
    ? { label: 'Ready',       cls: 'pill-info'    }
    : completedCount > 0
    ? { label: 'In Progress', cls: 'pill-warn'    }
    : { label: 'Not Started', cls: 'pill-muted'   };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}>
      {/* Titlebar */}
      <div className="page-titlebar">
        <div>
          <h1 style={{ margin: 0, fontSize: 20, fontWeight: 600 }}>Company Details</h1>
          <p style={{ margin: '2px 0 0', fontSize: 13, color: 'rgba(18,23,36,.5)' }}>Gusto Embedded Payroll onboarding</p>
        </div>
        <button
          className="btn btn-primary"
          disabled={!allDone || onboardingFinished}
          onClick={() => setOnboardingFinished(true)}
          style={{ cursor: allDone && !onboardingFinished ? 'pointer' : 'not-allowed', opacity: allDone && !onboardingFinished ? 1 : 0.45 }}
          title={!allDone ? 'Complete all setup steps first' : ''}
        >
          {onboardingFinished ? 'Submitted — Pending Approval' : 'Finish Onboarding'}
        </button>
      </div>

      {/* Scrollable content */}
      <div className="content-area">
        <div className="content-inner">

          {onboardingFinished && (
            <div className="finish-banner" style={{ marginBottom: 16 }}>
              {I.sparkle}
              <div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>Onboarding submitted — awaiting approval</div>
                <div style={{ fontSize: 13, color: 'rgba(18,23,36,.55)', marginTop: 2 }}>Gusto's Risk team typically approves within 15 minutes to 2 business days. You'll receive a <code>company.approved</code> webhook when the company can run payroll.</div>
              </div>
            </div>
          )}

          {/* ── Company header card ─────────────────────────── */}
          <div className="card-s" style={{ marginBottom: 14 }}>
            <div className="co-header">
              <div className="co-av">MC</div>
              <div className="co-meta">
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                  <h2 className="co-name">{COMPANY.legal_name}</h2>
                  <span className={`pill ${overallStatus.cls}`}>{overallStatus.label}</span>
                </div>
                <div className="co-sub">
                  <span>{COMPANY.tax_payer_type}</span>
                  <span style={{ opacity: .35 }}>·</span>
                  <span>EIN {COMPANY.ein}</span>
                  <span style={{ opacity: .35 }}>·</span>
                  <span>{COMPANY.industry_title}</span>
                </div>
              </div>
              <button className="btn btn-secondary btn-sm" style={{ cursor: 'pointer', alignSelf: 'flex-start', flexShrink: 0 }}>Edit Info</button>
            </div>
            <div className="co-stats">
              <div className="co-stat">
                {I.mapPin}
                <span className="co-stat-label">Locations</span>
                <span className="co-stat-val">{COMPANY.locations.length}</span>
              </div>
              <div className="co-stat">
                {I.users}
                <span className="co-stat-label">Employees</span>
                <span className="co-stat-val">{COMPANY.employee_count}</span>
              </div>
              <div className="co-stat">
                {I.calendar}
                <span className="co-stat-label">Pay Schedule</span>
                <span className="co-stat-val">{COMPANY.pay_schedule.frequency}</span>
              </div>
              <div className="co-stat">
                {I.bank}
                <span className="co-stat-label">Bank</span>
                <span className="co-stat-val">Chase ····8912</span>
              </div>
              <div className="co-stat">
                {I.dollar}
                <span className="co-stat-label">Filing Form</span>
                <span className="co-stat-val">Form {COMPANY.filing_form}</span>
              </div>
            </div>
          </div>

          {/* ── Setup checklist card ────────────────────────── */}
          <div className="card-s" style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
              <h3 style={{ margin: 0, fontSize: 15, fontWeight: 600 }}>Payroll Setup Checklist</h3>
              <span className="muted" style={{ fontSize: 13 }}>{completedCount} of {totalCount} steps complete</span>
            </div>
            <div className="prog-track" role="progressbar" aria-valuenow={pct} aria-valuemin={0} aria-valuemax={100} aria-label={`${pct}% complete`}>
              <div className="prog-fill" style={{ width: `${pct}%` }} />
            </div>

            {phases.map(({ phase, steps: phaseSteps }) => (
              <div key={phase}>
                <div className="phase-label">{phase}</div>
                {phaseSteps.map(step => {
                  const cfg = stepStatusConfig(step.status);
                  return (
                    <div key={step.id} className="setup-step">
                      <div className={`step-badge ${cfg.badgeCls}`}>
                        {stepIcon(step.status)}
                      </div>
                      <div className="step-body">
                        <div className="step-title-row">
                          <span className="step-title">{step.title}</span>
                        </div>
                        <div className="step-desc">{step.description}</div>
                        {/* Simulate deposits link for demo */}
                        {step.id === 'verify_bank_info' && step.status === 'awaiting' && (
                          <button className="simulate-link" style={{ marginTop: 7 }} onClick={simulateDeposits}>
                            Simulate deposits (demo)

                        )}
                      </div>
                      <div className="step-end">
                        <span className={`pill ${cfg.pillCls}`} style={{ fontSize: 11, flexShrink: 0 }}>{cfg.pillLabel}</span>

                          <button className="btn btn-primary btn-sm" onClick={() => setActiveModal('state_setup')} style={{ cursor: 'pointer' }}>

                        {step.status === 'ready' && step.id === 'verify_bank_info' && (
                          <button className="btn btn-primary btn-sm" onClick={() => setActiveModal('verify_bank')} style={{ cursor: 'pointer' }}>
                            Verify →
                          </button>
                        )}
                        {step.status === 'ready' && step.id === 'sign_all_forms' && (
                          <button className="btn btn-primary btn-sm" onClick={() => setActiveModal('sign_forms')} style={{ cursor: 'pointer' }}>
                            Set up →
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}

            {allDone && !onboardingFinished && (
              <div style={{ marginTop: 16, padding: '14px 16px', background: 'rgba(45,163,141,.06)', borderRadius: 10, border: '1px solid rgba(45,163,141,.2)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14, color: '#1F7262' }}>All steps complete — ready to submit</div>
                  <div style={{ fontSize: 12, color: 'rgba(18,23,36,.55)', marginTop: 2 }}>Click "Finish Onboarding" above to submit for Gusto's approval review (15 min – 2 business days).</div>
                </div>
                {I.check('#2DA38D')}
              </div>
            )}
          </div>

          {/* ── Detail cards grid ───────────────────────────── */}
          <div className="detail-grid">

            {/* Federal Tax */}
            <div className="card-s">
              <p className="dc-label">Federal Tax Details</p>
              <div className="dc-row"><span className="dc-key">Legal Name</span><span className="dc-val">{COMPANY.legal_name}</span></div>
              <div className="dc-row"><span className="dc-key">EIN</span><span className="dc-val">{COMPANY.ein}</span></div>
              <div className="dc-row"><span className="dc-key">Entity Type</span><span className="dc-val">{COMPANY.tax_payer_type}</span></div>
              <div className="dc-row"><span className="dc-key">Filing Form</span><span className="dc-val">Form {COMPANY.filing_form}</span></div>
              <div className="dc-row"><span className="dc-key">NAICS Code</span><span className="dc-val">{COMPANY.naics_code}</span></div>
            </div>

            {/* Bank Account */}
            <div className="card-s">
              <p className="dc-label">Bank Account</p>
              <div className="dc-row"><span className="dc-key">Account Name</span><span className="dc-val">{COMPANY.bank_account.name}</span></div>
              <div className="dc-row"><span className="dc-key">Account #</span><span className="dc-val">{COMPANY.bank_account.hidden_account_number}</span></div>
              <div className="dc-row"><span className="dc-key">Type</span><span className="dc-val">{COMPANY.bank_account.account_type}</span></div>
              <div className="dc-row"><span className="dc-key">Routing #</span><span className="dc-val">····1021</span></div>
              <div className="dc-row">
                <span className="dc-key">Verification</span>
                <span className="pill pill-warn" style={{ fontSize: 11 }}>Awaiting Deposits</span>
              </div>
            </div>

            {/* Locations */}
            <div className="card-s">
              <p className="dc-label">Company Locations ({COMPANY.locations.length})</p>
              {COMPANY.locations.map(loc => (
                <div key={loc.uuid} className="loc-item">
                  <div className="loc-name">{loc.label}</div>
                  <div className="loc-addr">{loc.street1}, {loc.city}, {loc.state} {loc.zip}</div>
                  <div className="loc-tags">
                    {loc.filing_address  && <span className="pill pill-muted" style={{ fontSize: 10 }}>Filing</span>}
                    {loc.mailing_address && <span className="pill pill-muted" style={{ fontSize: 10 }}>Mailing</span>}
                    {!loc.filing_address && !loc.mailing_address && <span className="pill pill-info" style={{ fontSize: 10 }}>Work Location</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* Pay Schedule */}
            <div className="card-s">
              <p className="dc-label">Pay Schedule</p>
              <div className="dc-row"><span className="dc-key">Frequency</span><span className="dc-val">{COMPANY.pay_schedule.frequency}</span></div>
              <div className="dc-row"><span className="dc-key">First Pay Date</span><span className="dc-val">{fmtDate(COMPANY.pay_schedule.anchor_pay_date)}</span></div>
              <div className="dc-row"><span className="dc-key">End of Pay Period</span><span className="dc-val">{fmtDate(COMPANY.pay_schedule.anchor_end_of_pay_period)}</span></div>
              <div className="dc-row" style={{ marginTop: 8 }}>
                <span className="dc-key">Industry</span>
                <span className="dc-val" style={{ textAlign: 'right', maxWidth: 180 }}>{COMPANY.industry_title}</span>
              </div>
              <div className="dc-row">
                <span className="dc-key">NAICS</span>
                <span className="dc-val">{COMPANY.naics_code}</span>
              </div>
            </div>

          </div>
        </div>
      </div>

      {/* ── Modals ──────────────────────────────────────────── */}
      {activeModal === 'state_setup' && (
        <StateTaxModal
          onClose={() => setActiveModal(null)}
          onComplete={() => completeStep('state_setup', 'Tax requirements submitted for Oregon (OR) and Texas (TX)')}
        />
      )}
      {activeModal === 'verify_bank' && (
        <BankVerifyModal
          onClose={() => setActiveModal(null)}
          onComplete={() => completeStep('verify_bank_info', 'Chase Business Checking ····8912 — verified')}
        />
      )}
      {activeModal === 'sign_forms' && (
        <SignFormsModal
          onClose={() => setActiveModal(null)}
          onComplete={() => completeStep('sign_all_forms', 'Signatory added · 3 documents signed')}
        />
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// APP
// ────────────────────────────────────────────────────────────────────────────

function App() {
  return (
    <div className="app">
      <Sidebar />
      <div className="main" style={{ overflow: 'hidden' }}>
        <Topbar />
        <CompanyPage />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
