<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run Payroll — 1-800Accountant Portal</title>
<link rel="icon" href=".claude/1-800Accountant Design System/assets/brand/favicon.ico">
<link rel="stylesheet" href=".claude/1-800Accountant Design System/ui_kits/portal/portal.css">
<style>
/* ── Nested nav ───────────────────────────────────────────── */
.nav-section-parent {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; font-weight: 500; font-size: 14px;
  color: rgba(18,23,36,.65); cursor: default;
  border-left: 3px solid transparent; user-select: none;
}
.nav-child {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px 9px 40px;
  font-size: 13px; font-weight: 500; color: rgba(18,23,36,.6);
  cursor: pointer; border-left: 3px solid transparent;
  transition: background 150ms ease, color 150ms ease;
}
.nav-child:hover { background: rgba(0,0,0,.04); color: rgba(18,23,36,.9); }
.nav-child.active { background: #DBF6E7; color: #1F7262; border-left-color: #2DA38D; }

/* ── Page titlebar ────────────────────────────────────────── */
.page-titlebar {
  padding: 18px 28px 14px; background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07);
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.period-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
  background: #EEF9F7; color: #1F7262; border: 1px solid rgba(45,163,141,.2);
}
.deadline-notice {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: #92400e; padding: 6px 12px;
  background: #FFF7ED; border: 1px solid rgba(217,119,6,.2); border-radius: 8px;
}

/* ── Wizard step bar ──────────────────────────────────────── */
.wizard-bar {
  display: flex; align-items: center;
  padding: 16px 28px; background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.07); flex-shrink: 0;
}
.wiz-step { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.wiz-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.wiz-num.done    { background: #DBF6E7; color: #1F7262; }
.wiz-num.active  { background: #2DA38D; color: #fff; }
.wiz-num.future  { background: #f1f3f8; color: rgba(18,23,36,.35); }
.wiz-label { font-size: 12px; font-weight: 600; white-space: nowrap; }
.wiz-label.done   { color: #2DA38D; }
.wiz-label.active { color: #121724; }
.wiz-label.future { color: rgba(18,23,36,.35); }
.wiz-line { flex: 1; height: 2px; margin: 0 12px; min-width: 20px; border-radius: 2px; }
.wiz-line.done   { background: #2DA38D; }
.wiz-line.future { background: #eef0f5; }

/* ── Content ──────────────────────────────────────────────── */
.content-area { flex: 1; overflow-y: auto; padding: 24px 28px; }
.content-inner { max-width: 800px; margin: 0 auto; }

/* ── Section heading ──────────────────────────────────────── */
.section-title {
  font-size: 15px; font-weight: 700; color: #121724; margin: 0 0 4px;
}
.section-sub {
  font-size: 13px; color: rgba(18,23,36,.5); margin: 0 0 20px; line-height: 1.45;
}

/* ── Payroll info card ────────────────────────────────────── */
.info-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border: 1px solid rgba(0,0,0,.08); border-radius: 10px;
  overflow: hidden; margin-bottom: 20px;
}
.info-cell {
  padding: 14px 16px; background: #fff;
  border-right: 1px solid rgba(0,0,0,.07);
}
.info-cell:last-child { border-right: 0; }
.info-cell-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(18,23,36,.4); margin-bottom: 5px; }
.info-cell-val { font-size: 14px; font-weight: 700; color: #121724; }
.info-cell-sub { font-size: 11px; color: rgba(18,23,36,.45); margin-top: 2px; }

/* ── Employee roster (step 1) ─────────────────────────────── */
.roster-row {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px; border-bottom: 1px solid rgba(0,0,0,.05);
}
.roster-row:last-child { border-bottom: 0; }
.r-av {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}
.r-info { flex: 1; min-width: 0; }
.r-name { font-size: 14px; font-weight: 600; color: #121724; }
.r-title { font-size: 12px; color: rgba(18,23,36,.5); margin-top: 1px; }
.r-pay-type { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.r-pay-type.salary { background: #EEF9F7; color: #1F7262; }
.r-pay-type.hourly  { background: #EFF6FF; color: #1D4ED8; }
.r-amount { font-size: 14px; font-weight: 700; color: #121724; text-align: right; min-width: 90px; }
.r-amount-sub { font-size: 11px; color: rgba(18,23,36,.4); text-align: right; }

/* ── Compensation editor (step 2) ────────────────────────── */
.comp-head {
  display: grid; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: rgba(18,23,36,.4);
  padding: 8px 16px; border-bottom: 1px solid rgba(0,0,0,.07);
}
.comp-row { padding: 14px 16px; border-bottom: 1px solid rgba(0,0,0,.05); }
.comp-row:last-child { border-bottom: 0; }
.comp-row-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.comp-fields { display: grid; gap: 10px; }
.cf-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: rgba(18,23,36,.45); margin-bottom: 5px;
}
.cf-input {
  height: 36px; width: 100%; padding: 0 10px;
  border: 1px solid rgba(0,0,0,.15); border-radius: 6px;
  font-size: 14px; font-family: inherit; color: #121724;
  background: #fff; outline: none; box-sizing: border-box;
  transition: border-color 150ms, box-shadow 150ms;
}
.cf-input:focus { border-color: #2DA38D; box-shadow: 0 0 0 3px rgba(45,163,141,.1); }
.cf-input:disabled { background: #f8f9fb; color: rgba(18,23,36,.35); cursor: default; }
.cf-input.readonly { background: #f8f9fb; }
.cf-wrap { position: relative; }
.cf-prefix {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; font-weight: 500; color: rgba(18,23,36,.4); pointer-events: none;
}
.cf-wrap .cf-input { padding-left: 20px; }
.cf-suffix {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 12px; font-weight: 500; color: rgba(18,23,36,.35); pointer-events: none;
}
.comp-total {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: #f8f9fb; border-radius: 0 0 10px 10px;
  border-top: 1px solid rgba(0,0,0,.07);
}

/* ── Calculate state ──────────────────────────────────────── */
.calc-idle-card {
  text-align: center; padding: 48px 32px;
  border: 1.5px dashed rgba(45,163,141,.3); border-radius: 12px;
  background: rgba(45,163,141,.02);
}
.calc-spinner {
  width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 16px;
  border: 3px solid #eef0f5; border-top-color: #2DA38D;
  animation: spin 700ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Totals breakdown ─────────────────────────────────────── */
.totals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
.totals-section { border: 1px solid rgba(0,0,0,.08); border-radius: 10px; overflow: hidden; }
.totals-head { padding: 10px 14px; background: #f8f9fb; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(18,23,36,.5); border-bottom: 1px solid rgba(0,0,0,.06); }
.t-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; border-bottom: 1px solid rgba(0,0,0,.04); font-size: 13px; gap: 8px; }
.t-row:last-child { border-bottom: 0; }
.t-key { color: rgba(18,23,36,.6); font-weight: 500; }
.t-val { font-weight: 600; color: #121724; font-variant-numeric: tabular-nums; }
.t-val.neg { color: #C71D1D; }
.t-row.total-row { background: #f8f9fb; }
.t-row.total-row .t-key { color: #121724; font-weight: 700; font-size: 13px; }
.t-row.total-row .t-val { color: #2DA38D; font-size: 14px; }

  display: flex; align-items: center; justify-content: space-between; gap: 16px;

.debit-label { font-size: 12px; color: rgba(18,23,36,.5); font-weight: 500; }
.debit-val { font-size: 22px; font-weight: 800; color: #121724; font-variant-numeric: tabular-nums; }
.debit-sub { font-size: 11px; color: rgba(18,23,36,.45); margin-top: 2px; }

/* ── Per-employee result rows ─────────────────────────────── */
.emp-result-row {
  display: flex; align-items: center; gap: 12px;

.er-name { font-size: 13px; font-weight: 600; color: #121724; flex: 1; }

.er-net { font-size: 13px; font-weight: 700; color: #121724; min-width: 90px; text-align: right; font-variant-numeric: tabular-nums; }

/* ── Submit review ────────────────────────────────────────── */
.review-row { display: flex; align-items: flex-start; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,.05); font-size: 13px; gap: 8px; }
.review-row:last-child { border-bottom: 0; }
.rk { color: rgba(18,23,36,.55); font-weight: 500; }
.rv { font-weight: 600; color: #121724; text-align: right; }

  padding: 12px 15px; font-size: 13px; color: #92400e; margin-bottom: 16px;

/* ── Success screen ───────────────────────────────────────── */

.success-icon {

.success-stat { border: 1px solid rgba(0,0,0,.08); border-radius: 10px; padding: 14px 12px; text-align: center; }
.success-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(18,23,36,.4); margin-bottom: 6px; }
.success-stat-val { font-size: 18px; font-weight: 800; color: #121724; font-variant-numeric: tabular-nums; }

/* ── Footer nav ───────────────────────────────────────────── */
.step-footer {
  padding: 14px 28px; border-top: 1px solid rgba(0,0,0,.07);
  background: #fff; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
</style>

// Per-employee calculation results (used after Calculate step)
function calcEmployee(emp) {
  if (emp.pay_type === 'exempt') {
    const gross = parseFloat(emp.regular_pay || 0) + parseFloat(emp.bonus || 0) + parseFloat(emp.reimbursement || 0);
    const taxes = +(gross * 0.2743).toFixed(2);
    return { gross, taxes, net: +(gross - taxes).toFixed(2) };
  }
  const hourlyRate = emp.id === 'e2' ? 45 : 52;
  const reg = parseFloat(emp.regular_hours || 0) * hourlyRate;
  const ot  = parseFloat(emp.overtime_hours || 0) * hourlyRate * 1.5;
  const dot = parseFloat(emp.double_ot_hours || 0) * hourlyRate * 2;
  const bonus = parseFloat(emp.bonus || 0);
  const reimb = parseFloat(emp.reimbursement || 0);
  const gross = +(reg + ot + dot + bonus + reimb).toFixed(2);
  const taxBase = gross - reimb;
  const taxes = +(taxBase * 0.2743).toFixed(2);
  return { gross, taxes, net: +(gross - taxes).toFixed(2) };
}

// ────────────────────────────────────────────────────────────────────────────

function fmt$(n) {
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDateRange(s, e) {
  const opts = { month: 'short', day: 'numeric', year: 'numeric' };
  const sd = new Date(s + 'T12:00:00');
  const ed = new Date(e + 'T12:00:00');
  return sd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' – ' + ed.toLocaleDateString('en-US', opts);
}

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function Sidebar() {

// ────────────────────────────────────────────────────────────────────────────
// WIZARD BAR
// ────────────────────────────────────────────────────────────────────────────

const STEPS = [
  { n: 1, label: 'Review Period' },
  { n: 2, label: 'Update Hours' },
  { n: 3, label: 'Calculate' },
  { n: 4, label: 'Review & Submit' },
];

function WizardBar({ step }) {
  return (
    <div className="wizard-bar" role="navigation" aria-label="Payroll steps">
      {STEPS.map((s, i) => {
        const state = step > s.n ? 'done' : step === s.n ? 'active' : 'future';
        return (
          <React.Fragment key={s.n}>
            <div className="wiz-step">
              <div className={`wiz-num ${state}`}>
                {state === 'done' ? I.checkSmall : s.n}
              </div>
              <span className={`wiz-label ${state}`}>{s.label}</span>
            </div>
            {i < STEPS.length - 1 && (
              <div className={`wiz-line ${step > s.n ? 'done' : 'future'}`} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// STEP 1 — REVIEW PAY PERIOD
// ────────────────────────────────────────────────────────────────────────────

    <div>
      <p className="section-title">Review Upcoming Payroll</p>

// ────────────────────────────────────────────────────────────────────────────
// STEP 2 — UPDATE COMPENSATION
// ────────────────────────────────────────────────────────────────────────────

function Step2({ employees, onChange }) {
  function update(id, field, value) {
    onChange(employees.map(e => e.id === id ? { ...e, [field]: value } : e));
  }

  return (
    <div>
      <p className="section-title">Update Compensation</p>
      <p className="section-sub">Adjust hours and compensation for this pay period. Hourly employees: enter regular, overtime, and double-overtime hours. Salaried employees: add bonuses or reimbursements as needed.</p>

      <div className="card-s" style={{ padding: 0, overflow: 'hidden' }}>
        {employees.map((emp, idx) => {
          const isExempt = emp.pay_type === 'exempt';
          const hourlyRate = emp.id === 'e2' ? 45 : 52;

          // Live gross estimate
          let estGross = 0;
          if (isExempt) {
            estGross = parseFloat(emp.regular_pay || 0) + parseFloat(emp.bonus || 0) + parseFloat(emp.reimbursement || 0);
          } else {
            estGross = parseFloat(emp.regular_hours || 0) * hourlyRate
              + parseFloat(emp.overtime_hours || 0) * hourlyRate * 1.5
              + parseFloat(emp.double_ot_hours || 0) * hourlyRate * 2
              + parseFloat(emp.bonus || 0)
              + parseFloat(emp.reimbursement || 0);
          }

          return (
            <div key={emp.id} className="comp-row" style={{ borderBottom: idx < employees.length - 1 ? '1px solid rgba(0,0,0,.07)' : 'none' }}>
              <div className="comp-row-top">
                <div className="r-av" style={{ background: emp.color, width: 36, height: 36, fontSize: 12, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, flexShrink: 0 }}>{emp.initials}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: '#121724' }}>{emp.name}</div>
                  <div style={{ fontSize: 12, color: 'rgba(18,23,36,.5)' }}>{emp.title} · {emp.rate_label}</div>
                </div>
                <span className={`r-pay-type ${isExempt ? 'salary' : 'hourly'}`}>{isExempt ? 'Salary' : 'Hourly'}</span>
              </div>

              {isExempt ? (
                /* Exempt / salaried */
                <div className="comp-fields" style={{ gridTemplateColumns: '1fr 1fr 1fr' }}>
                  <div>
                    <div className="cf-label">Regular Pay</div>
                    <div className="cf-wrap">
                      <span className="cf-prefix">$</span>
                      <input className="cf-input readonly" value={emp.regular_pay} readOnly
                        style={{ background: '#f8f9fb', color: 'rgba(18,23,36,.45)' }} />
                    </div>
                    <div style={{ fontSize: 10, color: 'rgba(18,23,36,.4)', marginTop: 3 }}>Salary-derived, read-only</div>
                  </div>
                  <div>
                    <div className="cf-label">Bonus</div>
                    <div className="cf-wrap">
                      <span className="cf-prefix">$</span>
                      <input className="cf-input" type="number" min="0" step="0.01"
                        value={emp.bonus}
                        placeholder="0.00"
                        onChange={e => update(emp.id, 'bonus', e.target.value)} />
                    </div>
                  </div>
                  <div>
                    <div className="cf-label">Reimbursement</div>
                    <div className="cf-wrap">
                      <span className="cf-prefix">$</span>
                      <input className="cf-input" type="number" min="0" step="0.01"
                        value={emp.reimbursement}
                        placeholder="0.00"
                        onChange={e => update(emp.id, 'reimbursement', e.target.value)} />
                    </div>
                  </div>
                </div>
              ) : (
                /* Non-exempt / hourly */
                <div className="comp-fields" style={{ gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr' }}>
                  <div>
                    <div className="cf-label">Reg. Hours</div>
                    <div className="cf-wrap">
                      <input className="cf-input" type="number" min="0" max="80" step="0.5"
                        value={emp.regular_hours}
                        onChange={e => update(emp.id, 'regular_hours', e.target.value)} />
                      <span className="cf-suffix">hrs</span>
                    </div>
                  </div>
                  <div>
                    <div className="cf-label">OT Hours</div>
                    <div className="cf-wrap">
                      <input className="cf-input" type="number" min="0" step="0.5"
                        value={emp.overtime_hours}
                        onChange={e => update(emp.id, 'overtime_hours', e.target.value)} />
                      <span className="cf-suffix">hrs</span>
                    </div>
                    <div style={{ fontSize: 10, color: 'rgba(18,23,36,.4)', marginTop: 3 }}>1.5×</div>
                  </div>
                  <div>
                    <div className="cf-label">2× OT</div>
                    <div className="cf-wrap">
                      <input className="cf-input" type="number" min="0" step="0.5"
                        value={emp.double_ot_hours}
                        onChange={e => update(emp.id, 'double_ot_hours', e.target.value)} />
                      <span className="cf-suffix">hrs</span>
                    </div>
                    <div style={{ fontSize: 10, color: 'rgba(18,23,36,.4)', marginTop: 3 }}>2×</div>
                  </div>
                  <div>
                    <div className="cf-label">Bonus</div>
                    <div className="cf-wrap">
                      <span className="cf-prefix">$</span>
                      <input className="cf-input" type="number" min="0" step="0.01"
                        value={emp.bonus}
                        placeholder="0.00"
                        onChange={e => update(emp.id, 'bonus', e.target.value)} />
                    </div>
                  </div>
                  <div>
                    <div className="cf-label">Reimburse.</div>
                    <div className="cf-wrap">
                      <span className="cf-prefix">$</span>
                      <input className="cf-input" type="number" min="0" step="0.01"
                        value={emp.reimbursement}
                        placeholder="0.00"
                        onChange={e => update(emp.id, 'reimbursement', e.target.value)} />
                    </div>
                  </div>
                </div>
              )}

              <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 6 }}>
                <span style={{ fontSize: 11, color: 'rgba(18,23,36,.4)' }}>Estimated gross:</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: '#2DA38D', fontVariantNumeric: 'tabular-nums' }}>{fmt$(estGross)}</span>
              </div>
            </div>
          );
        })}

        {/* Footer total */}
        <div className="comp-total">
          <span style={{ fontSize: 12, color: 'rgba(18,23,36,.5)', fontWeight: 500 }}>Estimated total gross pay</span>
          <span style={{ fontSize: 15, fontWeight: 800, color: '#121724', fontVariantNumeric: 'tabular-nums' }}>
            {fmt$(employees.reduce((sum, emp) => {
              const r = calcEmployee(emp);
              return sum + r.gross;
            }, 0))}
          </span>
        </div>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// STEP 3 — CALCULATE
// ────────────────────────────────────────────────────────────────────────────

function Step3({ employees, calculated, onCalculate }) {
  const results = employees.map(e => ({ ...e, ...calcEmployee(e) }));
  const totalGross  = results.reduce((s, r) => s + r.gross, 0);
  const totalTaxes  = results.reduce((s, r) => s + r.taxes, 0);
  const totalNet    = results.reduce((s, r) => s + r.net, 0);

  // Breakdowns
  const regular     = results.reduce((s, r) => {
    if (r.pay_type === 'exempt') return s + parseFloat(r.regular_pay || 0);
    const hr = r.id === 'e2' ? 45 : 52;
    return s + parseFloat(r.regular_hours || 0) * hr;
  }, 0);
  const overtime    = results.reduce((s, r) => {
    if (r.pay_type === 'exempt') return s;
    const hr = r.id === 'e2' ? 45 : 52;
    return s + parseFloat(r.overtime_hours || 0) * hr * 1.5 + parseFloat(r.double_ot_hours || 0) * hr * 2;
  }, 0);
  const bonuses     = results.reduce((s, r) => s + parseFloat(r.bonus || 0), 0);
  const reimburse   = results.reduce((s, r) => s + parseFloat(r.reimbursement || 0), 0);

  const fedWH     = +(totalGross * 0.1502).toFixed(2);
  const ss        = +(totalGross * 0.062).toFixed(2);
  const medicare  = +(totalGross * 0.0145).toFixed(2);
  const stateWH   = +(totalGross * 0.0576).toFixed(2);
  const totalWH   = +(fedWH + ss + medicare + stateWH).toFixed(2);

  const empSS     = ss;
  const empMed    = medicare;
  const futa      = +(Math.min(totalGross, 7000 * 3) * 0.006 * 0.15).toFixed(2);
  const suta      = +(totalGross * 0.024).toFixed(2);
  const empTaxes  = +(empSS + empMed + futa + suta).toFixed(2);
  const bankDebit = +(totalGross + empTaxes).toFixed(2);

  if (!calculated) {
    return (
      <div>
        <p className="section-title">Calculate Payroll</p>
        <p className="section-sub">Trigger the Gusto calculation engine to compute taxes, benefits, and deductions. This is an asynchronous operation — Gusto returns HTTP 202 and processes in the background.</p>
        <div className="calc-idle-card">
          <div style={{ width: 52, height: 52, borderRadius: '50%', background: '#EEF9F7', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
            {I.payroll}
          </div>
          <div style={{ fontSize: 16, fontWeight: 700, color: '#121724', marginBottom: 6 }}>Ready to Calculate</div>
          <div style={{ fontSize: 13, color: 'rgba(18,23,36,.5)', marginBottom: 24, maxWidth: 380, margin: '0 auto 24px' }}>
            Gusto will apply all tax withholdings, benefit deductions, and garnishments for {employees.length} employees.
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap', marginBottom: 24 }}>
            {employees.map(e => (
              <div key={e.id} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '5px 12px', border: '1px solid rgba(0,0,0,.09)', borderRadius: 20, background: '#fff', fontSize: 12, fontWeight: 600 }}>
                <div style={{ width: 22, height: 22, borderRadius: '50%', background: e.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>{e.initials}</div>
                <span>{e.name}</span>
                <span style={{ color: '#2DA38D', fontVariantNumeric: 'tabular-nums' }}>{fmt$(calcEmployee(e).gross)}</span>
              </div>
            ))}
          </div>
          <button className="btn btn-primary" onClick={onCalculate} style={{ fontSize: 14, height: 40, padding: '0 28px', minWidth: 180 }}>
            Calculate Payroll
          </button>
          <div style={{ marginTop: 12, fontSize: 12, color: 'rgba(18,23,36,.4)' }}>
            API: <code style={{ fontSize: 11, background: '#f1f3f8', padding: '1px 5px', borderRadius: 4 }}>PUT /v1/companies/{'{uuid}'}/payrolls/{'{uuid}'}/calculate</code>
          </div>
        </div>
      </div>
    );
  }

  // Results view
  return (
    <div>
      <p className="section-title">Calculation Complete</p>
      <p className="section-sub">Taxes, benefits, and deductions have been applied. Review the breakdown before submitting.</p>

      {/* Per-employee results */}
      <div className="card-s" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
        <div style={{ padding: '10px 14px', background: '#f8f9fb', borderBottom: '1px solid rgba(0,0,0,.07)', display: 'grid', gridTemplateColumns: '1fr 90px 90px', gap: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'rgba(18,23,36,.4)' }}>Employee</span>
          <span style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'rgba(18,23,36,.4)', textAlign: 'right' }}>Gross Pay</span>
          <span style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'rgba(18,23,36,.4)', textAlign: 'right' }}>Net Pay</span>
        </div>
        {results.map(r => (
          <div key={r.id} className="emp-result-row">
            <div style={{ width: 30, height: 30, borderRadius: '50%', background: r.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{r.initials}</div>
            <span className="er-name">{r.name}</span>
            <span className="er-gross">{fmt$(r.gross)}</span>
            <span className="er-net">{fmt$(r.net)}</span>
          </div>
        ))}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: '#f8f9fb', borderTop: '1px solid rgba(0,0,0,.07)' }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: '#121724' }}>Totals</span>
          <div style={{ display: 'flex', gap: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 800, color: '#121724', minWidth: 90, textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{fmt$(totalGross)}</span>
            <span style={{ fontSize: 13, fontWeight: 800, color: '#2DA38D', minWidth: 90, textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{fmt$(totalNet)}</span>
          </div>
        </div>
      </div>

      {/* Totals breakdown */}
      <div className="totals-grid">
        {/* Compensation */}
        <div className="totals-section">
          <div className="totals-head">Compensation Breakdown</div>
          <div className="t-row"><span className="t-key">Regular wages</span><span className="t-val">{fmt$(regular)}</span></div>
          {overtime > 0 && <div className="t-row"><span className="t-key">Overtime pay</span><span className="t-val">{fmt$(overtime)}</span></div>}
          {bonuses > 0 && <div className="t-row"><span className="t-key">Bonuses</span><span className="t-val">{fmt$(bonuses)}</span></div>}
          {reimburse > 0 && <div className="t-row"><span className="t-key">Reimbursements</span><span className="t-val">{fmt$(reimburse)}</span></div>}
          <div className="t-row total-row"><span className="t-key">Total Gross Pay</span><span className="t-val">{fmt$(totalGross)}</span></div>
        </div>

        {/* Employee taxes */}
        <div className="totals-section">
          <div className="totals-head">Employee Tax Withholding</div>
          <div className="t-row"><span className="t-key">Federal income tax</span><span className="t-val neg">({fmt$(fedWH)})</span></div>
          <div className="t-row"><span className="t-key">Social Security (6.2%)</span><span className="t-val neg">({fmt$(ss)})</span></div>
          <div className="t-row"><span className="t-key">Medicare (1.45%)</span><span className="t-val neg">({fmt$(medicare)})</span></div>
          <div className="t-row"><span className="t-key">Oregon state income tax</span><span className="t-val neg">({fmt$(stateWH)})</span></div>
          <div className="t-row total-row"><span className="t-key">Total Withheld</span><span className="t-val neg">({fmt$(totalWH)})</span></div>
        </div>

        {/* Net pay */}
        <div className="totals-section">
          <div className="totals-head">Net Pay to Employees</div>
          {results.map(r => (
            <div key={r.id} className="t-row">
              <span className="t-key">{r.name}</span>
              <span className="t-val">{fmt$(r.net)}</span>
            </div>
          ))}
          <div className="t-row total-row"><span className="t-key">Total Net Pay</span><span className="t-val">{fmt$(totalNet)}</span></div>
        </div>

        {/* Employer costs */}
        <div className="totals-section">
          <div className="totals-head">Employer Payroll Taxes</div>
          <div className="t-row"><span className="t-key">Employer SS (6.2%)</span><span className="t-val">{fmt$(empSS)}</span></div>
          <div className="t-row"><span className="t-key">Employer Medicare (1.45%)</span><span className="t-val">{fmt$(empMed)}</span></div>
          <div className="t-row"><span className="t-key">FUTA</span><span className="t-val">{fmt$(futa)}</span></div>
          <div className="t-row"><span className="t-key">Oregon SUTA (2.4%)</span><span className="t-val">{fmt$(suta)}</span></div>
          <div className="t-row total-row"><span className="t-key">Total Employer Taxes</span><span className="t-val">{fmt$(empTaxes)}</span></div>
        </div>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// STEP 4 — REVIEW & SUBMIT
// ────────────────────────────────────────────────────────────────────────────

function Step4({ employees, onSubmit, submitted }) {
  const results  = employees.map(e => ({ ...e, ...calcEmployee(e) }));
  const gross    = results.reduce((s, r) => s + r.gross, 0);
  const taxes    = results.reduce((s, r) => s + r.taxes, 0);
  const net      = results.reduce((s, r) => s + r.net, 0);
  const empTaxes = +(gross * 0.0910).toFixed(2); // ~SS + Medicare + FUTA/SUTA
  const bankDebit = +(gross + empTaxes).toFixed(2);

  if (submitted) {
    return (
      <div className="success-screen">
        <div className="success-icon">
          {I.check}
        </div>
        <div style={{ fontSize: 22, fontWeight: 800, color: '#121724', marginBottom: 6 }}>Payroll Submitted!</div>
        <div style={{ fontSize: 14, color: 'rgba(18,23,36,.5)', maxWidth: 420, lineHeight: 1.6, marginBottom: 4 }}>
          Payroll for <strong>Mountain Creek Consulting LLC</strong> has been finalized. Funds will be debited on <strong>May 28, 2025</strong> and employees will be paid on <strong>{fmtDate(PAYROLL_INFO.check_date)}</strong>.
        </div>
        <div className="success-cards">
          <div className="success-stat">
            <div className="success-stat-label">Total Gross</div>
            <div className="success-stat-val" style={{ fontSize: 16 }}>{fmt$(gross)}</div>
          </div>
          <div className="success-stat">
            <div className="success-stat-label">Net to Employees</div>
            <div className="success-stat-val" style={{ fontSize: 16 }}>{fmt$(net)}</div>
          </div>
          <div className="success-stat">
            <div className="success-stat-label">Bank Debit</div>
            <div className="success-stat-val" style={{ fontSize: 16, color: '#2DA38D' }}>{fmt$(bankDebit)}</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 24 }}>
          {results.map(r => (
            <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 14px', border: '1px solid rgba(0,0,0,.08)', borderRadius: 8, background: '#fff', fontSize: 12 }}>
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: r.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>{r.initials}</div>
              <span style={{ fontWeight: 600 }}>{r.name}</span>
              <span style={{ color: 'rgba(18,23,36,.5)' }}>→</span>
              <span style={{ fontWeight: 700, color: '#1F7262', fontVariantNumeric: 'tabular-nums' }}>{fmt$(r.net)}</span>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn" onClick={() => window.location.reload()} style={{ height: 36, padding: '0 18px', fontSize: 13 }}>
            Run Another Payroll
          </button>
          <button className="btn" style={{ height: 36, padding: '0 18px', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
            {I.bank} View Payroll Receipt
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <p className="section-title">Review & Submit</p>
      <p className="section-sub">This is the final step. Submitting payroll initiates fund transfers and cannot be undone after the deadline. Gusto calls this a critical operation — a payroll is not finalized without calling the submit endpoint.</p>

      {/* Bank debit callout */}
      <div className="debit-banner">
        <div>
          <div className="debit-label">Total Bank Debit</div>
          <div className="debit-val">{fmt$(bankDebit)}</div>
          <div className="debit-sub" style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            {I.bank} {PAYROLL_INFO.bank_account}
          </div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 11, color: 'rgba(18,23,36,.4)', marginBottom: 3 }}>Debit Date</div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>May 28, 2025</div>
          <div style={{ fontSize: 11, color: 'rgba(18,23,36,.4)', marginTop: 2 }}>Check date: {fmtDate(PAYROLL_INFO.check_date)}</div>
        </div>
      </div>

      {/* Deadline warning */}
      <div className="warn-box">
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 9 }}>
          <span style={{ marginTop: 1, flexShrink: 0 }}>{I.warn}</span>
          <div>
            <strong>Submission deadline: {PAYROLL_INFO.deadline}</strong><br/>
            Payroll cannot be canceled or reversed after this time. Ensure all compensation data is correct before submitting.
          </div>
        </div>
      </div>

      {/* Summary */}
      <div className="card-s" style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', color: 'rgba(18,23,36,.4)', marginBottom: 12 }}>Payroll Summary</div>
        <div className="review-row"><span className="rk">Pay period</span><span className="rv">{fmtDateRange(PAYROLL_INFO.pay_period_start, PAYROLL_INFO.pay_period_end)}</span></div>
        <div className="review-row"><span className="rk">Check date</span><span className="rv">{fmtDate(PAYROLL_INFO.check_date)}</span></div>
        <div className="review-row"><span className="rk">Total gross pay</span><span className="rv">{fmt$(gross)}</span></div>
        <div className="review-row"><span className="rk">Employee taxes withheld</span><span className="rv" style={{ color: '#C71D1D' }}>({fmt$(taxes)})</span></div>
        <div className="review-row"><span className="rk">Net pay to employees</span><span className="rv" style={{ color: '#1F7262' }}>{fmt$(net)}</span></div>
        <div className="review-row"><span className="rk">Employer payroll taxes</span><span className="rv">{fmt$(empTaxes)}</span></div>
        <div className="review-row" style={{ borderBottom: 0 }}><span className="rk" style={{ fontWeight: 700, color: '#121724' }}>Total bank debit</span><span className="rv" style={{ fontSize: 15 }}>{fmt$(bankDebit)}</span></div>
      </div>

      {/* Per-employee */}
      <div className="card-s" style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ padding: '10px 14px', background: '#f8f9fb', borderBottom: '1px solid rgba(0,0,0,.07)', fontSize: 12, fontWeight: 700, color: '#121724' }}>Employee Payments</div>
        {results.map(r => (
          <div key={r.id} className="emp-result-row">
            <div style={{ width: 30, height: 30, borderRadius: '50%', background: r.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{r.initials}</div>
            <span className="er-name">{r.name}</span>
            <span className="er-gross" style={{ fontSize: 11 }}>gross {fmt$(r.gross)}</span>
            <span className="er-net">{fmt$(r.net)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// CALCULATING OVERLAY
// ────────────────────────────────────────────────────────────────────────────

function CalcOverlay() {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(255,255,255,.88)', zIndex: 50, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
      <div className="calc-spinner" />
      <div style={{ fontSize: 16, fontWeight: 700, color: '#121724' }}>Calculating Payroll…</div>
      <div style={{ fontSize: 13, color: 'rgba(18,23,36,.5)' }}>Gusto is computing taxes, benefits, and deductions</div>
      <div style={{ fontSize: 11, color: 'rgba(18,23,36,.35)', marginTop: 4 }}>
        <code>PUT /v1/companies/{'{uuid}'}/payrolls/{'{uuid}'}/calculate</code>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// ROOT PAGE
// ────────────────────────────────────────────────────────────────────────────

function RunPayrollPage() {
  const [step, setStep] = React.useState(1);
  const [employees, setEmployees] = React.useState(INIT_EMPLOYEES);
  const [calculated, setCalculated] = React.useState(false);
  const [calculating, setCalculating] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);

  function handleCalculate() {
    setCalculating(true);
    setTimeout(() => {
      setCalculating(false);
      setCalculated(true);
    }, 2000);
  }

  function stepState(n) {
    return step > n ? 'done' : step === n ? 'active' : 'future';
  }

  const canAdvance = () => {
    if (step === 3) return calculated;
    return true;
  };

  const nextLabel = () => {
    if (step === 4) return 'Submit Payroll';
    if (step === 3 && !calculated) return 'Calculate First';
    return 'Continue';
  };

  function handleNext() {
    if (step === 4) {
      setSubmitted(true);
      return;
    }
    setStep(s => s + 1);
  }

  return (
    <div className="app">
      <Sidebar />
      <div className="main" style={{ overflow: 'hidden' }}>
        <Topbar />

        {/* Titlebar */}
        {!submitted && (
          <div className="page-titlebar">
            <div>
              <h1 style={{ fontSize: 17, fontWeight: 700, margin: 0 }}>Run Payroll</h1>
              <div style={{ fontSize: 12, color: 'rgba(18,23,36,.5)', marginTop: 2 }}>Mountain Creek Consulting LLC</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div className="period-badge">
                {fmtDateRange(PAYROLL_INFO.pay_period_start, PAYROLL_INFO.pay_period_end)}
              </div>
              <div className="deadline-notice">
                {I.clock}
                Deadline {PAYROLL_INFO.deadline}
              </div>
            </div>
          </div>
        )}

        {/* Wizard bar */}
        {!submitted && <WizardBar step={step} />}

        {/* Content */}
        <div className="content-area">
          <div className="content-inner">
            {step === 1 && <Step1 employees={employees} />}
            {step === 2 && <Step2 employees={employees} onChange={setEmployees} />}
            {step === 3 && <Step3 employees={employees} calculated={calculated} onCalculate={handleCalculate} />}
            {step === 4 && <Step4 employees={employees} onSubmit={() => setSubmitted(true)} submitted={submitted} />}
          </div>
        </div>

        {/* Footer navigation */}
        {!submitted && (
          <div className="step-footer">
            {step > 1 ? (
              <button className="btn" onClick={() => setStep(s => s - 1)} style={{ display: 'flex', alignItems: 'center', gap: 6, height: 36, padding: '0 16px', fontSize: 13 }}>
                {I.back} Back
              </button>
            ) : (
              <div />
            )}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 12, color: 'rgba(18,23,36,.4)' }}>Step {step} of 4</span>
              <button
                className={`btn ${step === 4 ? 'btn-primary' : 'btn-primary'}`}
                onClick={handleNext}
                disabled={!canAdvance()}
                style={{
                  height: 36, padding: '0 20px', fontSize: 13,
                  opacity: canAdvance() ? 1 : 0.45,
                  cursor: canAdvance() ? 'pointer' : 'not-allowed',
                  background: step === 4 ? '#F15F22' : undefined,
                  borderColor: step === 4 ? '#F15F22' : undefined,
                }}
              >
                {nextLabel()}
              </button>
            </div>
          </div>
        )}
      </div>

      {calculating && <CalcOverlay />}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// APP ROOT
// ────────────────────────────────────────────────────────────────────────────

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<RunPayrollPage />);
</script>
</body>
</html>
