<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>1-800Accountant — Portal UI Kit</title>
<link rel="icon" href="../../assets/brand/favicon.ico">
<link rel="stylesheet" href="portal.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
function App() {
  const [active, setActive] = React.useState(() => localStorage.getItem('portal_tab') || 'dashboard');
  const go = (id) => { setActive(id); localStorage.setItem('portal_tab', id); };

  let page;
  switch (active) {
    case 'transactions': page = <Transactions onNavigate={go} />; break;
    case 'documents':    page = <Documents onNavigate={go} />; break;
    case 'messages':     page = <Messages onNavigate={go} />; break;
    case 'bookkeeping':  page = <Bookkeeping onNavigate={go} />; break;
    default:             page = <Dashboard onNavigate={go} />;
  }

  return (
    <div className="app" data-screen-label={(active[0].toUpperCase()+active.slice(1))}>
      <Sidebar active={active} setActive={go} />
      <div className="main">
        <Topbar onNavigate={go} />
        {page}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
